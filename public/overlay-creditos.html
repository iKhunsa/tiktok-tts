<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Overlay — Créditos</title>
  <style>
    :root { --accent: #3ecf8e; --bg-alpha: 0.85; --speed: 40s; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    body.has-bgimg {
      background-image: var(--bg-img);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .card {
      background: rgba(0, 0, 0, var(--bg-alpha));
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
      padding: 0;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      height: 420px;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      text-align: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .card-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }
    .card-subtitle {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }
    .scroll-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
    }
    .scroll-track {
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: scrollUp var(--speed) linear infinite;
      will-change: transform;
    }
    .scroll-track:empty::after {
      content: 'Esperando eventos...';
      display: block;
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      padding: 30px 20px;
      letter-spacing: 1px;
    }
    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .section-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-align: center;
      padding: 14px 0 6px;
    }
    .credit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 18px;
      transition: background 0.2s;
    }
    .credit-row:hover { background: rgba(255,255,255,0.03); }
    .credit-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }
    .credit-name {
      font-size: 13px;
      color: #fff;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .credit-detail {
      font-size: 10px;
      color: var(--accent);
      white-space: nowrap;
      font-weight: 600;
    }
    .divider-row {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 8px 18px;
    }
    .new-entry {
      animation: fadeSlide 0.5s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="card-title">✦ Gracias ✦</div>
      <div class="card-subtitle">Seguidores · Donaciones · Compartidos</div>
    </div>
    <div class="scroll-viewport">
      <div class="scroll-track" id="track"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const _c = params.get('color');
    if (_c) {
      const colorVal = _c.startsWith('#') || _c.startsWith('rgb') ? _c : '#' + _c;
      document.documentElement.style.setProperty('--accent', colorVal);
    }
    const _b = params.get('bg');
    if (_b) document.documentElement.style.setProperty('--bg-alpha', _b);
    const _bgimg = params.get('bgimg');
    if (_bgimg) {
      const safeUrl = _bgimg.replace(/'/g, "%27");
      document.documentElement.style.setProperty('--bg-img', `url('${safeUrl}')`);
      document.body.classList.add('has-bgimg');
    }
    const speedRaw = params.get('speed');
    const speedNum = speedRaw ? parseFloat(speedRaw) : 40;
    document.documentElement.style.setProperty('--speed', (isNaN(speedNum) ? 40 : speedNum) + 's');

    const track = document.getElementById('track');

    function makeRow(icon, name, detail = '') {
      const row = document.createElement('div');
      row.className = 'credit-row new-entry';
      row.innerHTML = `
        <span class="credit-icon">${icon}</span>
        <span class="credit-name">${esc(name)}</span>
        ${detail ? `<span class="credit-detail">${esc(detail)}</span>` : ''}
      `;
      return row;
    }

    function makeSection(label) {
      const s = document.createElement('div');
      s.className = 'section-label';
      s.textContent = label;
      return s;
    }

    function makeDivider() {
      const d = document.createElement('div');
      d.className = 'divider-row';
      return d;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    const localCredits = { donors: [], followers: [], sharers: [] };
    const MAX_CREDITS = 50;

    function buildList(credits) {
      if (credits) {
        localCredits.donors = (credits.donors || []).slice(-MAX_CREDITS);
        localCredits.followers = (credits.followers || []).slice(-MAX_CREDITS);
        localCredits.sharers = (credits.sharers || []).slice(-MAX_CREDITS);
      }
      track.innerHTML = '';
      const hasAny = localCredits.donors.length || localCredits.followers.length || localCredits.sharers.length;
      if (!hasAny) return;

      const addSection = (label, items, buildRow) => {
        if (!items.length) return;
        track.appendChild(makeSection(label));
        items.forEach(it => track.appendChild(buildRow(it)));
        track.appendChild(makeDivider());
      };

      addSection('🎁  Donaciones',  localCredits.donors,    it => makeRow('🎁', it.user, `×${it.count} ${it.giftName}`));
      addSection('💜  Seguidores',  localCredits.followers, it => makeRow('💜', it.user));
      addSection('🔗  Compartieron', localCredits.sharers,   it => makeRow('🔗', it.user));

      // Duplicate for seamless infinite loop
      track.appendChild(track.cloneNode(true));
      resetAnimation();
    }

    function resetAnimation() {
      track.style.animation = 'none';
      void track.offsetHeight;
      track.style.animation = '';
    }

    function appendEntry(type, data) {
      if (type === 'gift') {
        localCredits.donors.push({ user: data.user, giftName: data.giftName || '', count: data.repeatCount || 1, ts: Date.now() });
        if (localCredits.donors.length > MAX_CREDITS) localCredits.donors.shift();
      } else if (type === 'follow') {
        localCredits.followers.push({ user: data.user, ts: Date.now() });
        if (localCredits.followers.length > MAX_CREDITS) localCredits.followers.shift();
      } else if (type === 'share') {
        localCredits.sharers.push({ user: data.user, ts: Date.now() });
        if (localCredits.sharers.length > MAX_CREDITS) localCredits.sharers.shift();
      }
      // Rebuild entirely to keep both halves perfectly identical
      buildList(null);
    }

    fetch('/api/overlay-stats')
      .then(r => r.json())
      .then(d => buildList(d.credits || { donors: [], followers: [], sharers: [] }))
      .catch(() => {});

    let ws, retryDelay = 2000;
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen = () => { retryDelay = 2000; };
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'gift')   appendEntry('gift',   d);
          if (d.type === 'follow') appendEntry('follow', d);
          if (d.type === 'share')  appendEntry('share',  d);
          if (d.type === 'connected') {
            fetch('/api/overlay-stats').then(r => r.json())
              .then(s => buildList(s.credits || { donors: [], followers: [], sharers: [] })).catch(() => {});
          }
        } catch(_) {}
      };
      ws.onclose = () => { setTimeout(connectWS, retryDelay); retryDelay = Math.min(retryDelay * 2, 30000); };
      ws.onerror = () => ws.close();
    }
    connectWS();
  </script>
</body>
</html>
