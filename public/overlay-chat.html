<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Overlay — Chat Unificado</title>
  <style>
    :root {
      --accent: #3ecf8e;
      --bg-alpha: 0.82;
      --font-size: 14px;
      --tiktok:  #fe2c55;
      --twitch:  #9146ff;
      --youtube: #ff0000;
      --bg-img: none;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      width: 420px;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
      gap: 5px;
    }
    body.has-bgimg {
      background-image: var(--bg-img);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    #chat-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow: hidden;
    }
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      background: rgba(8, 8, 8, var(--bg-alpha));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 7px 11px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
      font-size: var(--font-size);
      line-height: 1.4;
      word-break: break-word;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }
    .platform-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .dot-tiktok  { background: var(--tiktok); }
    .dot-twitch  { background: var(--twitch); }
    .dot-youtube { background: var(--youtube); }
    .msg-user {
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      flex-shrink: 0;
      font-size: calc(var(--font-size) - 1px);
    }
    .msg-sep { color: rgba(255,255,255,0.35); flex-shrink: 0; font-size: calc(var(--font-size) - 1px); }
    .msg-text { color: rgba(255,255,255,0.88); flex: 1; min-width: 0; }
    .msg-body  { display: flex; align-items: baseline; gap: 5px; flex: 1; min-width: 0; }
    .chat-emote {
      height: 18px;
      width: auto;
      vertical-align: middle;
      display: inline-block;
      margin: 0 1px;
    }
  </style>
</head>
<body>
  <div id="chat-container"></div>
  <script>
    const params    = new URLSearchParams(location.search);
    const _c = params.get('color');   if (_c) document.documentElement.style.setProperty('--accent', '#' + _c);
    const _b = params.get('bg');      if (_b) document.documentElement.style.setProperty('--bg-alpha', _b);
    const _s = parseFloat(params.get('size')); if (Number.isFinite(_s) && _s > 0) document.documentElement.style.setProperty('--font-size', _s + 'px');
    const _bgimg = params.get('bgimg');
    if (_bgimg) { document.documentElement.style.setProperty('--bg-img', `url('${_bgimg}')`); document.body.classList.add('has-bgimg'); }
    function intParam(name, def) { const n = parseInt(params.get(name), 10); return Number.isFinite(n) && n > 0 ? n : def; }
    const maxMsgs   = intParam('maxmsgs', 30);
    const showUsers = params.get('usernames') !== '0';
    const filterRaw = params.get('platforms') || 'tiktok,twitch,youtube';
    const allowedPlatforms = new Set(filterRaw.split(',').map(s => s.trim().toLowerCase()));

    const container = document.getElementById('chat-container');

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderText(text, emotes) {
      if (!emotes || Object.keys(emotes).length === 0) return escapeHtml(text);
      const parts = text.split(/(:[a-zA-Z0-9_\-]+:)/g);
      return parts.map(part => {
        const m = part.match(/^:([\w\-]+):$/);
        if (m && emotes[m[1]]?.url) {
          return `<img src="${escapeHtml(emotes[m[1]].url)}" alt="${escapeHtml(m[1])}" class="chat-emote">`;
        }
        if (emotes[part]?.url) {
          return `<img src="${escapeHtml(emotes[part].url)}" alt="${escapeHtml(part)}" class="chat-emote">`;
        }
        return escapeHtml(part);
      }).join('');
    }

    function addMessage(data) {
      if (!allowedPlatforms.has(data.platform)) return;

      const msg = document.createElement('div');
      msg.className = 'msg';

      const dot = document.createElement('span');
      dot.className = `platform-dot dot-${data.platform}`;
      msg.appendChild(dot);

      const body = document.createElement('div');
      body.className = 'msg-body';

      if (showUsers) {
        const user = document.createElement('span');
        user.className = 'msg-user';
        user.textContent = data.user;
        const sep = document.createElement('span');
        sep.className = 'msg-sep';
        sep.textContent = ':';
        body.appendChild(user);
        body.appendChild(sep);
      }

      const text = document.createElement('span');
      text.className = 'msg-text';
      text.innerHTML = renderText(data.comment, data.emotes);
      body.appendChild(text);

      msg.appendChild(body);
      container.appendChild(msg);

      // Trim oldest messages
      while (container.children.length > maxMsgs) {
        container.removeChild(container.firstChild);
      }
    }

    // WebSocket connection with auto-reconnect
    let ws = null;
    function connectWS() {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'chat') addMessage(d);
        } catch (_) {}
      };
      ws.onclose = () => { ws = null; setTimeout(connectWS, 2000); };
      ws.onerror = () => ws.close();
    }
    connectWS();
  </script>
</body>
</html>
