<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Overlay — Seguidores</title>
  <style>
    :root { --accent: #3ecf8e; --bg-alpha: 0.80; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      width: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body.has-bgimg {
      background-image: var(--bg-img);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .card {
      background: rgba(0, 0, 0, var(--bg-alpha));
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
      padding: 22px 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .icon {
      font-size: 22px;
      line-height: 1;
    }
    .label {
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
    }
    .count {
      font-size: 56px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }
    .count.bump {
      animation: bump 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes bump {
      0%   { transform: scale(1); color: #fff; }
      35%  { transform: scale(1.28); color: var(--accent); }
      100% { transform: scale(1); color: #fff; }
    }
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }
    .goal-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .goal-bar-track {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      overflow: hidden;
    }
    .goal-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 0%;
    }
    .goal-numbers {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .goal-current { color: #fff; font-weight: 600; }
    .icon-inline { width: 1em; height: 1em; vertical-align: -0.15em; display: inline-block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img class="icon-inline" src="icons/people.svg" alt=""></div>
    <div class="label">Nuevos seguidores</div>
    <div class="count" id="count">0</div>
    <div class="divider" id="divider" style="display:none"></div>
    <div class="goal-section" id="goalSection" style="display:none">
      <div class="goal-bar-track">
        <div class="goal-bar-fill" id="goalBar" style="width:0%"></div>
      </div>
      <div class="goal-numbers">
        <span class="goal-current" id="goalCurrent">0</span>
        <span id="goalTarget">0</span>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    // Apply color/bg params as CSS vars
    const _c = params.get('color'); if (_c) document.documentElement.style.setProperty('--accent', '#' + _c);
    const _b = params.get('bg');    if (_b) document.documentElement.style.setProperty('--bg-alpha', _b);
    const _bgimg = params.get('bgimg');
    if (_bgimg) { document.documentElement.style.setProperty('--bg-img', `url('${_bgimg}')`); document.body.classList.add('has-bgimg'); }

    const goal   = parseInt(params.get('goal')   || '0', 10);

    let sessionFollows = 0;
    let baseFollowerCount = 0;

    function updateGoalTarget() {
      if (goal > 0) {
        document.getElementById('divider').style.display = '';
        document.getElementById('goalSection').style.display = '';
        document.getElementById('goalTarget').textContent = (baseFollowerCount + goal).toLocaleString('es');
      }
    }

    function render() {
      const el = document.getElementById('count');
      const total = baseFollowerCount + sessionFollows;
      el.textContent = total.toLocaleString('es');
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');

      if (goal > 0) {
        const pct = Math.min((sessionFollows / goal) * 100, 100);
        document.getElementById('goalBar').style.width = pct + '%';
        document.getElementById('goalCurrent').textContent = total.toLocaleString('es');
      }
    }

    fetch('/api/overlay-stats')
      .then(r => r.json())
      .then(d => {
        sessionFollows = d.followCount || 0;
        baseFollowerCount = d.baseFollowerCount || 0;
        updateGoalTarget();
        render();
      })
      .catch(() => {});

    let ws, retryDelay = 2000;
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen = () => { retryDelay = 2000; };
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'follow') { sessionFollows++; render(); }
          if (d.type === 'connected') { sessionFollows = 0; render(); }
          if (d.type === 'follower-base') {
            baseFollowerCount = d.count || 0;
            updateGoalTarget();
            render();
          }
        } catch(_) {}
      };
      ws.onclose = () => {
        setTimeout(connectWS, retryDelay);
        retryDelay = Math.min(retryDelay * 2, 30000);
      };
      ws.onerror = () => ws.close();
    }
    connectWS();
  </script>
</body>
</html>
