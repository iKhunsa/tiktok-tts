<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Overlay — Social</title>
  <style>
    :root { --accent: #3ecf8e; --bg-alpha: 0.85; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      width: 320px;
    }
    body.has-bgimg {
      background-image: var(--bg-img);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    body.layout-cols { width: 480px; }

    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    body.layout-cols .container {
      flex-direction: row;
      align-items: flex-start;
    }

    .panel {
      background: rgba(0, 0, 0, var(--bg-alpha));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .panel-icon { font-size: 14px; }
    .panel-title {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      flex: 1;
    }
    .panel-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .panel-list {
      list-style: none;
      max-height: 220px;
      overflow: hidden;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .entry:last-child { border-bottom: none; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(14px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .entry-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      color: #000;
    }
    .entry-name {
      font-size: 12px;
      color: #fff;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-time {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .empty-msg {
      padding: 18px 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel" id="panel-follows">
      <div class="panel-header">
        <span class="panel-icon">💜</span>
        <span class="panel-title">Nuevos seguidores</span>
        <span class="panel-count" id="count-follows">0</span>
      </div>
      <ul class="panel-list" id="list-follows">
        <li class="empty-msg">Sin seguidores aún</li>
      </ul>
    </div>

    <div class="panel" id="panel-shares">
      <div class="panel-header">
        <span class="panel-icon">🔗</span>
        <span class="panel-title">Compartieron</span>
        <span class="panel-count" id="count-shares">0</span>
      </div>
      <ul class="panel-list" id="list-shares">
        <li class="empty-msg">Sin compartidos aún</li>
      </ul>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const _c = params.get('color');
    if (_c) {
      const colorVal = _c.startsWith('#') || _c.startsWith('rgb') ? _c : '#' + _c;
      document.documentElement.style.setProperty('--accent', colorVal);
    }
    const _b = params.get('bg');
    if (_b) document.documentElement.style.setProperty('--bg-alpha', _b);
    const _bgimg = params.get('bgimg');
    if (_bgimg) {
      const safeUrl = _bgimg.replace(/'/g, "%27");
      document.documentElement.style.setProperty('--bg-img', `url('${safeUrl}')`);
      document.body.classList.add('has-bgimg');
    }
    if (params.get('layout') === 'cols') document.body.classList.add('layout-cols');

    const MAX_ENTRIES = 10;
    const COLORS = ['#fe2c55','#25f4ee','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#3ecf8e'];
    let colorIdx = 0;
    const colorMap = {};
    function getColor(user) {
      if (!colorMap[user]) { colorMap[user] = COLORS[colorIdx++ % COLORS.length]; }
      return colorMap[user];
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    function fmtTime(ts) {
      try {
        return new Date(ts || Date.now()).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        return '--:--';
      }
    }

    function purgeColorMap() {
      const visibleUsers = new Set();
      document.querySelectorAll('.entry-name').forEach(el => visibleUsers.add(el.textContent));
      for (const key of Object.keys(colorMap)) {
        if (!visibleUsers.has(key)) delete colorMap[key];
      }
    }

    function addEntry(listId, countId, user, ts) {
      const list = document.getElementById(listId);
      const countEl = document.getElementById(countId);

      // Remove empty placeholder
      const empty = list.querySelector('.empty-msg');
      if (empty) empty.remove();

      const color = getColor(user);
      const initials = user.substring(0, 2).toUpperCase();

      const li = document.createElement('li');
      li.className = 'entry';
      li.innerHTML = `
        <div class="entry-avatar" style="background:${color}33;color:${color}">${esc(initials)}</div>
        <span class="entry-name">${esc(user)}</span>
        <span class="entry-time">${fmtTime(ts || Date.now())}</span>
      `;

      // Newest first
      list.insertBefore(li, list.firstChild);

      // Trim to max
      while (list.children.length > MAX_ENTRIES) {
        list.removeChild(list.lastChild);
      }

      purgeColorMap();
      countEl.textContent = parseInt(countEl.textContent || '0', 10) + 1;
    }

    function hydrate(credits) {
      if (!credits) return;
      const follows = (credits.followers || []).slice(-MAX_ENTRIES).reverse();
      const shares  = (credits.sharers  || []).slice(-MAX_ENTRIES).reverse();
      follows.forEach(it => addEntry('list-follows', 'count-follows', it.user, it.ts));
      shares.forEach(it  => addEntry('list-shares',  'count-shares',  it.user, it.ts));
    }

    fetch('/api/overlay-stats')
      .then(r => r.json())
      .then(d => hydrate(d.credits))
      .catch(() => {});

    let ws, retryDelay = 2000;
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen = () => { retryDelay = 2000; };
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'follow') addEntry('list-follows', 'count-follows', d.user, d.timestamp);
          if (d.type === 'share')  addEntry('list-shares',  'count-shares',  d.user, d.timestamp);
          if (d.type === 'connected') {
            document.getElementById('list-follows').innerHTML = '<li class="empty-msg">Sin seguidores aún</li>';
            document.getElementById('list-shares').innerHTML  = '<li class="empty-msg">Sin compartidos aún</li>';
            document.getElementById('count-follows').textContent = '0';
            document.getElementById('count-shares').textContent  = '0';
          }
        } catch(_) {}
      };
      ws.onclose = () => { setTimeout(connectWS, retryDelay); retryDelay = Math.min(retryDelay * 2, 30000); };
      ws.onerror = () => ws.close();
    }
    connectWS();
  </script>
</body>
</html>
